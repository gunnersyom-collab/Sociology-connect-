<!DOCTYPE html>
<html>
<head>
    <title>Sociology Connect</title>
    <style>
        body { background-color: #f9f9f9; font-family: sans-serif; padding: 20px; }
        #chat-history { border: 1px solid #ccc; padding: 10px; height: 300px; overflow-y: scroll; margin-bottom: 10px; background: white; }
    </style>
</head>
<body>

    <h3>Sociology Connect AI</h3>
    
    <div id="chat-history"></div>
    
    <input type="text" id="userInput" placeholder="Type your message here...">
    <button onclick="sendMessage()">Send</button>

    <script>
        async function sendMessage() {
            const userText = document.getElementById('userInput').value;
            const chatHistory = document.getElementById('chat-history');

            // Ergaa user sana screen irratti argisiisi
            chatHistory.innerHTML += `<p><b>You:</b> ${userText}</p>`;
            document.getElementById('userInput').value = '';

            try {
                // Server kee wajjin quunnamtii uumuu
                const response = await fetch('https://sociology-connect.onrender.com/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: userText })
                });

                // Yoo server-n deebii dogoggoraa (404, 500) kenne
                if (!response.ok) {
                    alert("Server Error: " + response.status);
                    return;
                }

                const data = await response.json();
                
                // Deebii AI argattee screen irratti argisiisi
                chatHistory.innerHTML += `<p><b>AI:</b> ${data.reply}</p>`;

            } catch (error) {
                // Yoo quunnamtiin hin uumamne (Failed to fetch)
                alert("Connection Error: " + error.message);
            }
        }
    </script>
</body>
</html>
